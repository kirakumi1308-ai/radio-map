<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🗾 新幹線全駅の旅 - 全国マップ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ナビゲーション -->
  <div class="nav-links">
    <a href="index.html" class="nav-link">🚄 乗車報告</a>
    <a href="map.html" class="nav-link active">🗾 全国の旅</a>
  </div>

  <!-- メインコンテナ -->
  <div class="container map-container-wrapper">
    
    <!-- 左側：地図 -->
    <div class="map-section">
      <h1 class="page-title">🗺️ 全国鉄道の旅</h1>
      
      <div class="progress-section">
        <div class="progress-label">スタート地点</div>
        <div class="progress-info">
          <span id="progress-current">0</span> / <span id="progress-total">3,800 km</span>
        </div>
        <div class="progress-bar-container">
          <div id="progress-bar" class="progress-bar" style="width: 0%;"></div>
        </div>
      </div>

      <div class="stats-cards">
        <div class="stat-card">
          <div class="stat-number" id="total-distance">0駅</div>
          <div class="stat-label">総走行距離</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="visited-stations">新大阪</div>
          <div class="stat-label">訪問駅数</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="current-location">126駅中</div>
          <div class="stat-label">現在地</div>
        </div>
      </div>

      <!-- 地図エリア -->
      <div id="map-container" class="map-area">
        <!-- JavaScriptで描画 -->
      </div>
    </div>

    <!-- 右側：スタンプ＆ランキング -->
    <div class="side-section">
      
      <!-- スタンプ -->
      <div class="stamps-section">
        <h2>🏛️ 名所スタンプ</h2>
        <div class="stamp-count">収集: <span id="stamp-count">0</span>/14</div>
        <div id="stamp-grid" class="stamp-grid">
          <!-- JavaScriptで生成 -->
        </div>
      </div>

      <!-- ランキング -->
      <div class="ranking-section">
        <h2>🏆 参加ランキング</h2>
        <div id="ranking-list" class="ranking-list">
          <!-- JavaScriptで生成 -->
        </div>
      </div>

    </div>
  </div>

  <script src="script.js?v=4"></script>
</body>
</html>
