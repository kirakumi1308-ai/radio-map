  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Hiragino Sans','Meiryo',sans-serif; background:linear-gradient(135deg,#fef5e7 0%,#ffe8cc 100%); min-height:100vh; padding:20px; }
    
    .container { max-width:1200px; margin:0 auto; }
    
    /* ナビゲーション */
    .nav { display:flex; gap:12px; margin-bottom:24px; }
    .nav-btn { flex:1; padding:16px; background:#fff; border:none; border-radius:16px; font-size:16px; font-weight:600; cursor:pointer; box-shadow:0 4px 16px rgba(255,140,80,0.1); transition:all .3s; text-decoration:none; text-align:center; color:#333; }
    .nav-btn.active { background:linear-gradient(135deg,#ff8c50 0%,#ff6b35 100%); color:#fff; box-shadow:0 6px 24px rgba(255,108,53,0.4); }
    .nav-btn:hover:not(.active) { background:#fff5f0; transform:translateY(-2px); }
    
    /* 現在地バー */
    .location-bar { background:#fff; border-radius:20px; padding:20px; margin-bottom:24px; box-shadow:0 4px 16px rgba(255,140,80,0.1); text-align:center; }
    .location-label { font-size:14px; color:#a66543; margin-bottom:8px; font-weight:600; }
    .location-name { font-size:32px; font-weight:700; color:#ff8c50; }
    
    /* 地図エリア */
    #map-svg-area { position:relative; width:100%; max-width:800px; height:600px; margin:0 auto 24px; background:#fff; border-radius:20px; padding:20px; box-shadow:0 4px 16px rgba(255,140,80,0.1); overflow:hidden; }
    #map-svg-area svg { width:100%; height:100%; display:block; }
    
    /* 都道府県の色設定 */
    #map-svg-area .prefecture { fill:#ffffff; stroke:#cccccc; stroke-width:0.5; transition:fill .4s; }
    #map-svg-area .prefecture.visited { fill:#66bb6a; }
    #map-svg-area .prefecture.current-pref { fill:#ff7043; }
    
    /* 進捗バー */
    .progress-section { background:#fff; border-radius:20px; padding:24px; margin-bottom:24px; box-shadow:0 4px 16px rgba(255,140,80,0.1); }
    .progress-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .progress-title { font-size:18px; font-weight:700; color:#333; }
    .progress-stats { font-size:16px; color:#a66543; font-weight:600; }
    .progress-bar-bg { width:100%; height:32px; background:#f0f0f0; border-radius:16px; overflow:hidden; position:relative; }
    .progress-bar-fill { height:100%; background:linear-gradient(90deg,#ff8c50 0%,#ff6b35 100%); transition:width .6s; }
    .goal-badges { display:flex; justify-content:space-around; margin-top:16px; }
    .badge { text-align:center; }
    .badge-icon { font-size:28px; margin-bottom:4px; filter:grayscale(100%); opacity:0.5; transition:all .3s; }
    .badge.earned .badge-icon { filter:grayscale(0%); opacity:1; transform:scale(1.2); }
    .badge-label { font-size:12px; color:#999; font-weight:600; }
    .badge.earned .badge-label { color:#ff8c50; }
    
    /* WAYPOINT リスト */
    .waypoint-section { background:#fff; border-radius:20px; padding:24px; margin-bottom:24px; box-shadow:0 4px 16px rgba(255,140,80,0.1); }
    .waypoint-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; max-height:400px; overflow-y:auto; }
    .waypoint-chip { background:#f5f5f5; border-radius:12px; padding:12px; text-align:center; border:2px solid transparent; transition:all .3s; }
    .waypoint-chip.visited { background:linear-gradient(135deg,#e8f5e9 0%,#c8e6c9 100%); border-color:#66bb6a; }
    .waypoint-chip.current { background:linear-gradient(135deg,#fff3e0 0%,#ffe0b2 100%); border-color:#ff7043; box-shadow:0 0 12px rgba(255,112,67,0.5); animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.05);} }
    .waypoint-emoji { font-size:28px; margin-bottom:4px; }
    .waypoint-name { font-size:13px; font-weight:600; color:#333; margin-bottom:2px; }
    .waypoint-km { font-size:11px; color:#999; }
    
    /* スタンプセクション */
    .stamp-section { background:#fff; border-radius:20px; padding:24px; box-shadow:0 4px 16px rgba(255,140,80,0.1); }
    .stamp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px; margin-top:16px; }
    .stamp-card { background:#f5f5f5; border-radius:12px; padding:16px; text-align:center; border:2px solid transparent; transition:all .3s; }
    .stamp-card.earned { background:linear-gradient(135deg,#fff5f0 0%,#ffe8d9 100%); border-color:#ff8c50; box-shadow:0 4px 12px rgba(255,140,80,0.3); }
    .stamp-emoji { font-size:32px; margin-bottom:8px; filter:grayscale(100%); opacity:0.5; }
    .stamp-card.earned .stamp-emoji { filter:grayscale(0%); opacity:1; }
    .stamp-name { font-size:13px; font-weight:600; color:#333; }

    async function loadMap() {
      const mapArea = document.getElementById('map-svg-area');
      try {
        const response = await fetch('https://raw.githubusercontent.com/geolonia/japanese-prefectures/master/map-polygon.svg');
        if (!response.ok) throw new Error('SVG取得失敗');
        
        const svgText = await response.text();
        mapArea.innerHTML = svgText;
        
        const paths = mapArea.querySelectorAll('svg path, svg polygon');
        paths.forEach((path, index) => {
          path.classList.add('prefecture');
          const id = path.getAttribute('id') || '';
          const code = id.match(/\d+/)?.[0] || String(index + 1).padStart(2, '0');
          path.setAttribute('data-code', code);
        });
        
        console.log('✅ SVG地図読み込み完了、都道府県数:', paths.length);
      } catch (error) {
        console.warn('⚠️ SVG読み込み失敗、フォールバック表示:', error);
        mapArea.innerHTML = `<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="400" cy="300" rx="300" ry="200" fill="#ffffff" stroke="#cccccc" stroke-width="2"/>
          <text x="400" y="310" text-anchor="middle" font-size="24" fill="#666">日本地図</text>
        </svg>`;
      }
    }
    
    function updateMapColors(totalStations) {
      const prefs = document.querySelectorAll('#map-svg-area .prefecture');
      if (!prefs.length) { console.warn('⚠️ 都道府県要素が見つかりません'); return; }
      
      const visited = new Set();
      let currentPrefCode = null;
      
      WAYPOINTS.forEach((wp, index) => {
        if (index < totalStations) {
          visited.add(wp.prefCode.padStart(2, '0'));
          if (index === totalStations - 1) currentPrefCode = wp.prefCode.padStart(2, '0');
        }
      });
      
      prefs.forEach(pref => {
        const code = String(pref.dataset.code || '').padStart(2, '0');
        pref.classList.remove('visited', 'current-pref');
        if (code === currentPrefCode) {
          pref.classList.add('current-pref');
        } else if (visited.has(code)) {
          pref.classList.add('visited');
        }
      });
      
      console.log('✅ 地図の色分け更新: 訪問済み', visited.size, '県, 現在地', currentPrefCode);
    }
    
    async function renderAll() {
      const { data, error } = await sb.from('participations').select('station_progress');
      if (error) { console.error('❌ データ取得エラー:', error); return; }
      
      const totalStations = data.reduce((sum, p) => sum + (p.station_progress || 0), 0);
      const progress = (totalStations / GOAL_GOLD) * 100;
      
      console.log('📊 合計訪問駅数:', totalStations);
      
      document.getElementById('progress-current').textContent = totalStations;
      document.getElementById('progress-bar').style.width = Math.min(progress, 100) + '%';
      
      const currentStation = totalStations > 0 ? WAYPOINTS[totalStations - 1] : WAYPOINTS[0];
      document.getElementById('current-location').textContent = currentStation.name;
      
      if (totalStations >= GOAL_BRONZE) document.getElementById('badge-bronze').classList.add('earned');
      if (totalStations >= GOAL_SILVER) document.getElementById('badge-silver').classList.add('earned');
      if (totalStations >= GOAL_GOLD) document.getElementById('badge-gold').classList.add('earned');
      
      const waypointList = document.getElementById('waypoint-list');
      waypointList.innerHTML = WAYPOINTS.map((wp, index) => {
        const visitedClass = index < totalStations ? 'visited' : '';
        const currentClass = index === totalStations - 1 && totalStations > 0 ? 'current' : '';
        return `<div class="waypoint-chip ${visitedClass} ${currentClass}">
          <div class="waypoint-emoji">${wp.emoji}</div>
          <div class="waypoint-name">${wp.name}</div>
          <div class="waypoint-km">${index + 1}番目</div>
        </div>`;
      }).join('');
      
      const stampGrid = document.getElementById('stamp-grid');
      stampGrid.innerHTML = STAMPS.map(stamp => {
        const earned = totalStations > stamp.index;
        return `<div class="stamp-card ${earned ? 'earned' : ''}">
          <div class="stamp-emoji">${stamp.emoji}</div>
          <div class="stamp-name">${stamp.name}</div>
        </div>`;
      }).join('');
      
      updateMapColors(totalStations);
    }
    
    async function init() {
      console.log('🚀 地図ページ初期化開始');
      await loadMap();
      await renderAll();
      
      sb.channel('public:participations').on('postgres_changes', { event: '*', schema: 'public', table: 'participations' }, () => {
        console.log('🔄 リアルタイム更新を受信');
        renderAll();
      }).subscribe();
      
      console.log('✅ 初期化完了');
    }
