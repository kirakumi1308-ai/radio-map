<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚄 今日の乗車報告</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
      padding: 20px;
    }
    .nav {
      display: flex;
      gap: 10px;
      max-width: 1200px;
      margin: 0 auto 20px;
    }
    .nav a {
      flex: 1;
      padding: 12px 20px;
      background: rgba(255,255,255,0.2);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      text-align: center;
      font-weight: bold;
      transition: all 0.2s;
    }
    .nav a.active { background: white; color: #667eea; }
    .nav a:hover { background: rgba(255,255,255,0.3); }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .card h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: #555;
    }
    .my-stats {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      border-radius: 12px;
      padding: 16px;
      color: white;
      margin-bottom: 16px;
    }
    .my-stats .name { font-size: 0.9rem; opacity: 0.9; }
    .my-stats .km { font-size: 2rem; font-weight: bold; margin: 8px 0; }
    .my-stats .count { font-size: 0.85rem; opacity: 0.85; }
    .session-dots {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 12px 0;
    }
    .session-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e0e0e0;
      transition: background 0.3s;
    }
    .session-dot.used { background: #667eea; }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #667eea; }
    .btn-youtube {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 16px;
      text-decoration: none;
      display: block;
      text-align: center;
      transition: opacity 0.2s;
    }
    .btn-youtube:hover { opacity: 0.9; }
    .btn-participate {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-participate:hover { opacity: 0.9; }
    .btn-participate:disabled { background: #ccc; cursor: not-allowed; }
    .member-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 40px;
    }
    .member-chip {
      background: #f0f4ff;
      border: 1.5px solid #667eea;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.85rem;
    }
    .member-chip .km { color: #ff6b35; font-weight: bold; margin-left: 4px; }
    .rank-list { display: flex; flex-direction: column; gap: 10px; }
    .rank-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: #f9f9f9;
      border-radius: 10px;
    }
    .rank-num { font-size: 1.1rem; font-weight: bold; width: 32px; text-align: center; }
    .rank-name { flex: 1; font-size: 0.95rem; }
    .rank-km { font-size: 0.95rem; color: #ff6b35; font-weight: bold; }
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 0.95rem;
      transition: transform 0.4s ease;
      z-index: 999;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="nav">
  <a href="index.html" class="active">🚄 乗車報告</a>
  <a href="map.html">🗾 地図</a>
</div>

<div class="container">
  <!-- 左: 乗車報告フォーム -->
  <div class="card">
    <h2>🚄 今日の乗車報告</h2>
    
    <a href="https://youtu.be/q91wVnUGcnk?si=8mDKoE7orh-Qt9CY" target="_blank" class="btn-youtube">
      🔔 出発のベルを鳴らす（YouTube）
    </a>

    <div class="my-stats" id="my-stats" style="display:none;">
      <div class="name" id="my-name">あなたの累計</div>
      <div class="km" id="my-km">0駅</div>
      <div class="count" id="my-count">0回参加</div>
    </div>

    <div class="session-dots">
      <div class="session-dot" id="dot-0"></div>
      <div class="session-dot" id="dot-1"></div>
      <div class="session-dot" id="dot-2"></div>
    </div>

    <div class="form-group">
      <label>運転手の名前 *</label>
      <input type="text" id="input-name" placeholder="例: さらく" maxlength="20">
    </div>
    <div class="form-group">
      <label>一言コメント（任意）</label>
      <input type="text" id="input-comment" placeholder="例: 今日も元気よく！" maxlength="40">
    </div>

    <button class="btn-participate" id="btn-participate" onclick="participate()">
      👨‍✈️ 乗車報告
    </button>

    <div style="margin-top:24px">
      <h2>👨‍✈️ 今日の運転手</h2>
      <div class="member-list" id="member-list">
        <span style="color:#bbb;font-size:0.85rem;">まだ誰も乗務していません</span>
      </div>
    </div>
  </div>

  <!-- 右: 週間ランキング -->
  <div class="card">
    <h2>🏆 週間ランキング</h2>
    <div class="rank-list" id="rank-list">
      <span style="color:#bbb;font-size:0.85rem;">データを読み込み中…</span>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://hhiwvbthsyiwkoiffvwp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2we0MxN8UXNRyUz9sEy6eg_iK0L0b_v';
const EVENT_START = '2026-03-16';
const MAX_SESSIONS = 3;
const DOCTOR_YELLOW_PROBABILITY = 0.03;

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let todayData = [];
let allData = [];
let myName = localStorage.getItem('myName') || '';

window.addEventListener('load', async () => {
  await loadData();
  if (myName) document.getElementById('input-name').value = myName;
  setupRealtime();
});

async function loadData() {
  const today = new Date().toLocaleDateString('sv-SE');
  const [r1, r2] = await Promise.all([
    sb.from('participations').select('*').eq('date', today),
    sb.from('participations').select('*').gte('date', EVENT_START),
  ]);
  todayData = r1.data || [];
  allData = r2.data || [];
  renderAll();
}

function renderAll() {
  renderSessionStatus();
  renderMyStats();
  renderMemberList();
  renderRanking();
}

function renderSessionStatus() {
  const name = document.getElementById('input-name').value.trim() || myName;
  const used = todayData.filter(d => d.user_name === name).length;
  const rem = MAX_SESSIONS - used;
  document.getElementById('btn-participate').disabled = rem <= 0;
  document.getElementById('btn-participate').textContent = rem <= 0 
    ? '👨‍✈️ 勤務終了！お疲れ様でした！'
    : '👨‍✈️ 乗車報告';
  for (let i = 0; i < MAX_SESSIONS; i++)
    document.getElementById(`dot-${i}`).classList.toggle('used', i < used);
}

function renderMyStats() {
  if (!myName) return;
  const myData = allData.filter(d => d.user_name === myName);
  if (!myData.length) return;
  const myStations = myData.reduce((sum, r) => sum + (r.station_progress || 1), 0);
  document.getElementById('my-stats').style.display = 'block';
  document.getElementById('my-name').textContent = `${myName}さんの累計`;
  document.getElementById('my-km').textContent = `${myStations}駅`;
  document.getElementById('my-count').textContent = `${myData.length}回参加`;
}

function renderMemberList() {
  const el = document.getElementById('member-list');
  if (!todayData.length) {
    el.innerHTML = '<span style="color:#bbb;font-size:0.85rem;">まだ誰も乗務していません</span>';
    return;
  }
  const countMap = {};
  todayData.forEach(d => {
    if (!countMap[d.user_name]) countMap[d.user_name] = 0;
    countMap[d.user_name] += (d.station_progress || 1);
  });
  el.innerHTML = '';
  Object.entries(countMap).forEach(([name, stations]) => {
    const chip = document.createElement('div');
    chip.className = 'member-chip';
    chip.innerHTML = `${escapeHtml(name)}<span class="km">+${stations}駅</span>`;
    el.appendChild(chip);
  });
}

function renderRanking() {
  const el = document.getElementById('rank-list');
  if (!allData.length) {
    el.innerHTML = '<span style="color:#bbb;font-size:0.85rem;">データなし</span>';
    return;
  }
  const countMap = {};
  allData.forEach(d => {
    if (!countMap[d.user_name]) countMap[d.user_name] = 0;
    countMap[d.user_name] += (d.station_progress || 1);
  });
  const sorted = Object.entries(countMap)
    .map(([name, stations]) => ({ name, stations }))
    .sort((a, b) => b.stations - a.stations)
    .slice(0, 10);
  el.innerHTML = '';
  const medals = ['🥇', '🥈', '🥉'];
  sorted.forEach((entry, i) => {
    const item = document.createElement('div');
    item.className = 'rank-item';
    const rankDisplay = i < 3 ? medals[i] : `${i + 1}位`;
    item.innerHTML = `
      <div class="rank-num">${rankDisplay}</div>
      <div class="rank-name">${escapeHtml(entry.name)}</div>
      <div class="rank-km">${entry.stations}駅</div>
    `;
    el.appendChild(item);
  });
}

async function participate() {
  const userName = document.getElementById('input-name').value.trim();
  const comment = document.getElementById('input-comment').value.trim();
  if (!userName) { showToast('⚠️ 運転手の名前を入力してください'); return; }

  const { data: chk } = await sb.from('participations').select('id')
    .eq('user_name', userName).eq('date', new Date().toLocaleDateString('sv-SE'));
  if ((chk || []).length >= MAX_SESSIONS) {
    showToast('🎉 本日の勤務お疲れ様でした！'); return;
  }

  const isDoctorYellow = Math.random() < DOCTOR_YELLOW_PROBABILITY;
  const stationProgress = isDoctorYellow ? 2 : 1;

  const btn = document.getElementById('btn-participate');
  btn.disabled = true;
  btn.textContent = '登録中…';

  const { error } = await sb.from('participations').insert({
    user_name: userName,
    date: new Date().toLocaleDateString('sv-SE'),
    comment: comment || null,
    participated: true,
    station_progress: stationProgress,
    is_doctor_yellow: isDoctorYellow,
  });

  btn.textContent = '👨‍✈️ 乗車報告';
  if (error) {
    showToast('❌ エラーが発生しました'); console.error(error);
    btn.disabled = false; return;
  }

  myName = userName;
  localStorage.setItem('myName', userName);
  document.getElementById('input-comment').value = '';

  showToast(isDoctorYellow ? '🚄✨ ドクターイエロー搭乗！ +2駅！' : '✅ 乗車報告完了！ +1駅進みました！');
  await loadData();
}

function setupRealtime() {
  sb.channel('participations-channel')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'participations' },
      payload => {
        if (payload.new?.user_name !== myName) {
          const stations = payload.new?.station_progress || 1;
          showToast(`🎉 ${payload.new.user_name}さんが乗車報告！ +${stations}駅`);
        }
        loadData();
      })
    .subscribe();
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('input-name').addEventListener('input', renderSessionStatus);
</script>
</body>
</html>
